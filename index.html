<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Engine Demos Portal</title>
    
    <script src="coi-serviceworker.js"></script>

    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #121212;
            color: #eeeeee;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }

        h1 {
            margin-bottom: 2rem;
            font-weight: 600;
            letter-spacing: -0.5px;
        }

        .button-container {
            display: flex;
            flex-direction: column;
            gap: 1rem;
            width: 100%;
            max-width: 280px;
        }

        .demo-btn {
            display: block;
            padding: 14px;
            background-color: #007acc;
            color: #ffffff;
            text-align: center;
            text-decoration: none;
            border-radius: 6px;
            font-weight: bold;
            font-size: 1rem;
            transition: background-color 0.15s ease, transform 0.1s ease;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
        }

        .demo-btn:hover {
            background-color: #005999;
        }

        .demo-btn:active {
            transform: scale(0.98);
        }
    </style>
</head>
<body>

    <h1>Engine Demos</h1>

    <div class="button-container">
        <a class="demo-btn" href="./GeometryView/">GeometryView</a>
        <a class="demo-btn" href="./PhysicsSim/">PhysicsSim</a>
    </div>

</body>
</html>
