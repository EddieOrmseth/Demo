<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Tests.js</title>
  <script>
    // Emscripten pthreads require SharedArrayBuffer, which browsers only expose
    // when the page is cross-origin isolated (COOP + COEP headers). This inline
    // service worker intercepts every fetch response and injects those headers,
    // then reloads once so the page starts isolated without needing server config.
    (() => {
      if (self.crossOriginIsolated) return;
      const WORKER_SRC = `
        self.addEventListener('install', () => self.skipWaiting());
        self.addEventListener('activate', e => e.waitUntil(self.clients.claim()));
        self.addEventListener('fetch', e => {
          e.respondWith(fetch(e.request).then(r => {
            const h = new Headers(r.headers);
            h.set('Cross-Origin-Opener-Policy', 'same-origin');
            h.set('Cross-Origin-Embedder-Policy', 'require-corp');
            return new Response(r.body, { status: r.status, statusText: r.statusText, headers: h });
          }));
        });
      `;
      const blob = new Blob([WORKER_SRC], { type: 'text/javascript' });
      const url  = URL.createObjectURL(blob);
      navigator.serviceWorker.register(url).then(() => location.reload());
    })();
  </script>
  <style>
    body { 
      margin: 0; 
      background: #1e1e1e; 
      height: 100vh;
      display: flex;
    }
    #output {
      width: 100%;
      height: 100%;
      margin: 0;
      padding: 10px;
      border: none;
      background-color: #1e1e1e;
      color: #d4d4d4;
      font-family: 'Courier New', Courier, monospace;
      font-size: 14px;
      box-sizing: border-box;
      resize: none;
      outline: none;
    }
  </style>
</head>
<body>
  <textarea id="output" readonly></textarea>
  
  <script>
    const outputElement = document.getElementById('output');

    var Module = {
      print: (function() {
        return function(text) {
          if (arguments.length > 1) text = Array.prototype.slice.call(arguments).join(' ');
          if (outputElement) {
            outputElement.value += text + "\n";
            outputElement.scrollTop = outputElement.scrollHeight; // Auto-scrolls to the bottom
          }
          // Keeps console logging intact for debugging/emrun
          console.log(text); 
        };
      })(),
      printErr: function(text) {
        if (arguments.length > 1) text = Array.prototype.slice.call(arguments).join(' ');
        if (outputElement) {
          outputElement.value += text + "\n";
          outputElement.scrollTop = outputElement.scrollHeight;
        }
        console.error(text);
      }
    };
  </script>
  <script src="Tests.js"></script>
</body>
</html>
